name: Generate profile card (daily)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run cards
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          USERNAME: ${{ github.repository_owner }}
          REPO_WEIGHTS: ${{ vars.REPO_WEIGHTS }}
          WORK_REPO_REGEX: ${{ vars.WORK_REPO_REGEX }}
          AUTHOR_EMAILS: ${{ vars.AUTHOR_EMAILS }}
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/charts.svg cards/projects.svg
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "Update activity charts"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push rejected on attempt $attempt; pulling and retrying"
            git pull --rebase -X ours --autostash || exit 1
          done
          exit 1
