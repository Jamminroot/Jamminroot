name: Generate CV card

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run cv
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          USERNAME: ${{ github.repository_owner }}
          REPO_WEIGHTS: ${{ vars.REPO_WEIGHTS }}
          WORK_REPO_REGEX: ${{ vars.WORK_REPO_REGEX }}
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/cv.json cards/charts.svg cards/timeline.svg CV.md README.md
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "Update CV timeline"
            git push
          fi
