name: Generate CV card

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only — generate files as a downloadable artifact, do not commit"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run cv
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          USERNAME: ${{ github.repository_owner }}
          REPO_WEIGHTS: ${{ vars.REPO_WEIGHTS }}
          WORK_REPO_REGEX: ${{ vars.WORK_REPO_REGEX }}
          LEGAL_NAME: ${{ vars.LEGAL_NAME }}
          DATE_OF_BIRTH: ${{ vars.DATE_OF_BIRTH }}
          AUTHOR_EMAILS: ${{ vars.AUTHOR_EMAILS }}
          HIDDEN_PROMPT: ${{ vars.HIDDEN_PROMPT }}
          LLM_SUMMARY_GUIDANCE: ${{ vars.LLM_SUMMARY_GUIDANCE }}
          LLM_TIMELINE_GUIDANCE: ${{ vars.LLM_TIMELINE_GUIDANCE }}
          LLM_PROJECT_GUIDANCE: ${{ vars.LLM_PROJECT_GUIDANCE }}
      - name: Upload preview (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: cv-preview
          path: |
            CV.md
            README.md
            cards/cv.pdf
            cards/cv.json
            cards/charts.svg
            cards/projects.svg
      - name: Commit
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/cv.json cards/charts.svg cards/projects.svg cards/cv.pdf CV.md README.md career.json work-summary.json project-descriptions.json
          if git diff --staged --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "Update CV timeline"
          # Retry push if remote moved (parallel run from cards.yml). On conflict, prefer
          # our regenerated artifacts (-X ours) since they're the freshest output.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push rejected on attempt $attempt; pulling and retrying"
            git pull --rebase -X ours --autostash || exit 1
          done
          echo "push still failing after retries"
          exit 1
