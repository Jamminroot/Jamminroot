  <g transform="translate(24, 24)"><text class="fg" x="0" y="14" font-size="16" font-weight="700">Recent activity</text>
<text class="muted" x="600" y="14" font-size="10" text-anchor="end">updated 2026-05-09</text>
<text class="muted" x="0" y="32" font-size="12">Focused on personal and open-source projects including an n8n Telegram</text>
<text class="muted" x="0" y="50" font-size="12">integration, a Windows file-tagging utility, automated profile card</text>
<text class="muted" x="0" y="68" font-size="12">generation, and a Neovim IDE setup. Also built an image labeling tool</text>
<text class="muted" x="0" y="86" font-size="12">and</text>
<text class="accent" x="0" y="134" font-size="11" font-weight="600">2026 May</text>
