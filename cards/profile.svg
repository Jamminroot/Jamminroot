<text class="muted" x="600" y="398" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="414" font-size="11">Iterated on a Telegram integration n8n node fork, focusing on CI</text>
<text class="muted" x="86" y="430" font-size="11">stability and new trigger support.</text>
<text class="fg" x="86" y="458" font-size="13" font-weight="600">Windows file-tagging utility</text>
<text class="muted" x="600" y="458" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="474" font-size="11">Polished the file-tagging tool for Windows Explorer with README</text>
<text class="muted" x="86" y="490" font-size="11">and release updates.</text>
<text class="fg" x="86" y="518" font-size="13" font-weight="600">Neovim IDE configuration</text>
<text class="muted" x="600" y="518" font-size="10" text-anchor="end">Jamminroot/.dotfiles</text>
<text class="muted" x="86" y="534" font-size="11">Set up a complete Neovim IDE with treesitter, LSP, and clipboard</text>
<text class="muted" x="86" y="550" font-size="11">for remote sessions.</text>
<text class="fg" x="86" y="578" font-size="13" font-weight="600">Image labeling tool</text>
<text class="muted" x="600" y="578" font-size="10" text-anchor="end">Jamminroot/yolo-labeler</text>
<text class="muted" x="86" y="594" font-size="11">Developed a lightweight on-host YOLO labeler for personal use.</text>
<line class="border" x1="70" y1="378" x2="70" y2="606" stroke-width="1"/>
