<text class="fg" x="86" y="214" font-size="13" font-weight="600">Profile cards rendering</text>
<text class="muted" x="600" y="214" font-size="10" text-anchor="end">Jamminroot/jamminroot_profile_cards</text>
<text class="muted" x="86" y="230" font-size="11">Worked on combining sidebar cards and CV timeline into a single</text>
<text class="muted" x="86" y="246" font-size="11">profile SVG.</text>
