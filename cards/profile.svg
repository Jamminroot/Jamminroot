  <g transform="translate(24, 24)"><text class="fg" x="0" y="14" font-size="16" font-weight="700">Recent activity</text>
<text class="muted" x="600" y="14" font-size="10" text-anchor="end">updated 2026-05-09</text>
<text class="muted" x="0" y="32" font-size="12">Worked on Telegram automation via an n8n node fork, and built tools for</text>
<text class="muted" x="0" y="50" font-size="12">GitHub profile generation. Developed a Windows file-tagging application</text>
<text class="muted" x="0" y="68" font-size="12">and a personal image labeler, while maintaining a Neovim setup and a</text>
<text class="muted" x="0" y="86" font-size="12">Clash</text>
<text class="accent" x="0" y="134" font-size="11" font-weight="600">2026 May</text>
<circle class="accent" cx="70" cy="130" r="4"/>
<text class="fg" x="86" y="154" font-size="13" font-weight="600">GitHub profile automation scripts</text>
<text class="muted" x="600" y="154" font-size="10" text-anchor="end">Jamminroot/Jamminroot</text>
<text class="muted" x="86" y="170" font-size="11">Developed scripts to generate custom profile cards and a CV</text>
<text class="muted" x="86" y="186" font-size="11">timeline for the GitHub profile.</text>
<text class="fg" x="86" y="214" font-size="13" font-weight="600">Profile card generator</text>
<text class="muted" x="600" y="214" font-size="10" text-anchor="end">Jamminroot/jamminroot_profile_cards</text>
<text class="muted" x="86" y="230" font-size="11">Built a tool that produces sidebar cards and a CV timeline SVG</text>
<text class="muted" x="86" y="246" font-size="11">for the GitHub profile, with light/dark theme support.</text>
<line class="border" x1="70" y1="134" x2="70" y2="258" stroke-width="1"/>
<text class="accent" x="0" y="286" font-size="11" font-weight="600">2026 Apr</text>
<circle class="accent" cx="70" cy="282" r="4"/>
<text class="fg" x="86" y="306" font-size="13" font-weight="600">Clash proxy fork for FlClash client</text>
<text class="muted" x="600" y="306" font-size="10" text-anchor="end">Jamminroot/Clash.Meta</text>
<text class="muted" x="86" y="322" font-size="11">Maintained a fork of Clash.Meta to expose APIs needed by the</text>
<text class="muted" x="86" y="338" font-size="11">FlClash client.</text>
<line class="border" x1="70" y1="286" x2="70" y2="350" stroke-width="1"/>
