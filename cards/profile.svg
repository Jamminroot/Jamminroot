  <g transform="translate(24, 24)"><text class="fg" x="0" y="14" font-size="16" font-weight="700">Recent activity</text>
<text class="muted" x="600" y="14" font-size="10" text-anchor="end">updated 2026-05-09</text>
<text class="muted" x="0" y="32" font-size="12">Over the past year, built a Telegram automation node for n8n, polished a</text>
<text class="muted" x="0" y="50" font-size="12">Windows Explorer file-tagging utility, developed a personal CV/profile</text>
<text class="muted" x="0" y="68" font-size="12">card generator, maintained Neovim dotfiles, and created a YOLO labeling</text>
<text class="muted" x="0" y="86" font-size="12">tool.</text>
<text class="accent" x="0" y="134" font-size="11" font-weight="600">2026 May</text>
<circle class="accent" cx="70" cy="130" r="4"/>
<text class="fg" x="86" y="154" font-size="13" font-weight="600">Profile card generator</text>
<text class="muted" x="600" y="154" font-size="10" text-anchor="end">Jamminroot/Jamminroot</text>
<text class="muted" x="86" y="170" font-size="11">Developed a custom GitHub profile card generator with commit</text>
<text class="muted" x="86" y="186" font-size="11">weighting and private repo discovery.</text>
<text class="fg" x="86" y="214" font-size="13" font-weight="600">Profile cards and CV workflow</text>
<text class="muted" x="600" y="214" font-size="10" text-anchor="end">Jamminroot/jamminroot_profile_cards</text>
<text class="muted" x="86" y="230" font-size="11">Set up automated CV timeline generation and light/dark theme</text>
<text class="muted" x="86" y="246" font-size="11">adaptation for profile cards.</text>
<line class="border" x1="70" y1="134" x2="70" y2="258" stroke-width="1"/>
<text class="accent" x="0" y="286" font-size="11" font-weight="600">2026 Apr</text>
<circle class="accent" cx="70" cy="282" r="4"/>
<text class="fg" x="86" y="306" font-size="13" font-weight="600">Mihomo fork proxy tuning</text>
<text class="muted" x="600" y="306" font-size="10" text-anchor="end">Jamminroot/Clash.Meta</text>
<text class="muted" x="86" y="322" font-size="11">Re-exposed proxy APIs on a Clash.Meta fork to support FlClash</text>
<text class="muted" x="86" y="338" font-size="11">integration.</text>
<line class="border" x1="70" y1="286" x2="70" y2="350" stroke-width="1"/>
<text class="accent" x="0" y="378" font-size="11" font-weight="600">2026 Feb</text>
<circle class="accent" cx="70" cy="374" r="4"/>
<text class="fg" x="86" y="398" font-size="13" font-weight="600">Telegram n8n node fork</text>
<text class="muted" x="600" y="398" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="414" font-size="11">Iterated on CI fixes, authentication stability, and an album</text>
<text class="muted" x="86" y="430" font-size="11">trigger feature for the TelePilot Telegram node.</text>
<text class="fg" x="86" y="458" font-size="13" font-weight="600">File-tagging utility release prep</text>
<text class="muted" x="600" y="458" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="474" font-size="11">Prepared documentation, changelog, and Microsoft Store listing</text>
<text class="muted" x="86" y="490" font-size="11">for the Intag Windows Explorer tagger.</text>
<text class="fg" x="86" y="518" font-size="13" font-weight="600">Neovim config refinements</text>
<text class="muted" x="600" y="518" font-size="10" text-anchor="end">Jamminroot/.dotfiles</text>
<text class="muted" x="86" y="534" font-size="11">Fixed treesitter, LSP, and clipboard issues in personal Neovim</text>
<text class="muted" x="86" y="550" font-size="11">setup, added secret detection hooks.</text>
<text class="fg" x="86" y="578" font-size="13" font-weight="600">YOLO labeling tool development</text>
<text class="muted" x="600" y="578" font-size="10" text-anchor="end">Jamminroot/yolo-labeler</text>
<text class="muted" x="86" y="594" font-size="11">Built a fast on-host image labeling tool with multi-select mark</text>
<text class="muted" x="86" y="610" font-size="11">mode and batch operations.</text>
<line class="border" x1="70" y1="378" x2="70" y2="622" stroke-width="1"/>
<text class="accent" x="0" y="650" font-size="11" font-weight="600">2026 Jan</text>
<circle class="accent" cx="70" cy="646" r="4"/>
<text class="fg" x="86" y="670" font-size="13" font-weight="600">Telegram node session fix</text>
<text class="muted" x="600" y="670" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="686" font-size="11">Resolved TDLib session storage issues and released version bumps</text>
<text class="muted" x="86" y="702" font-size="11">for the n8n TelePilot node.</text>
<text class="fg" x="86" y="730" font-size="13" font-weight="600">Explorer tagger v2 release</text>
<text class="muted" x="600" y="730" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="746" font-size="11">Launched v2 of the Windows file-tagging utility, adding metadata</text>
<text class="muted" x="86" y="762" font-size="11">support and a Microsoft Store link.</text>
<line class="border" x1="70" y1="650" x2="70" y2="774" stroke-width="1"/>
<text class="accent" x="0" y="802" font-size="11" font-weight="600">2025 Sep</text>
<circle class="accent" cx="70" cy="798" r="4"/>
<text class="fg" x="86" y="822" font-size="13" font-weight="600">Telegram node auth work</text>
<text class="muted" x="600" y="822" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="838" font-size="11">Started working on authentication improvements for the Telegram</text>
<text class="muted" x="86" y="854" font-size="11">automation node.</text>
<line class="border" x1="70" y1="802" x2="70" y2="866" stroke-width="1"/>
<text class="accent" x="0" y="894" font-size="11" font-weight="600">2025 Aug</text>
<circle class="accent" cx="70" cy="890" r="4"/>
<text class="fg" x="86" y="914" font-size="13" font-weight="600">Telegram node deployment and docs</text>
<text class="muted" x="600" y="914" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="930" font-size="11">Added Docker deployment support and updated README with fork</text>
<text class="muted" x="86" y="946" font-size="11">features for the TelePilot node.</text>
<line class="border" x1="70" y1="894" x2="70" y2="958" stroke-width="1"/>
<text class="accent" x="0" y="986" font-size="11" font-weight="600">2025</text>
<circle class="accent" cx="70" cy="982" r="4"/>
<text class="fg" x="86" y="1006" font-size="13" font-weight="600">Telegram automation node foundation</text>
<text class="muted" x="600" y="1006" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="1022" font-size="11">Started the TelePilot Telegram node fork, laying ground-work</text>
<text class="muted" x="86" y="1038" font-size="11">with Docker support, Alpine builds, and initial CI.</text>
<line class="border" x1="70" y1="986" x2="70" y2="1050" stroke-width="1"/>
<text class="accent" x="0" y="1078" font-size="11" font-weight="600">2024</text>
<circle class="accent" cx="70" cy="1074" r="4"/>
<text class="fg" x="86" y="1098" font-size="13" font-weight="600">Windows Explorer file tagging tool</text>
<text class="muted" x="600" y="1098" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="1114" font-size="11">Developed Intag, a file-tagging utility for Windows Explorer,</text>
<text class="muted" x="86" y="1130" font-size="11">adding CLI support, logging, and packaging.</text>
<text class="fg" x="86" y="1158" font-size="13" font-weight="600">Personal profile notes updates</text>
<text class="muted" x="600" y="1158" font-size="10" text-anchor="end">Jamminroot/Jamminroot</text>
<text class="muted" x="86" y="1174" font-size="11">Made minor README updates to personal GitHub notes.</text>
<line class="border" x1="70" y1="1078" x2="70" y2="1186" stroke-width="1"/></g>
