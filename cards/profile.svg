<text class="accent" x="0" y="134" font-size="11" font-weight="600">2026 May</text>
<circle class="accent" cx="70" cy="130" r="4"/>
<text class="fg" x="86" y="154" font-size="13" font-weight="600">GitHub profile customisation and CV timeline bu…</text>
<text class="muted" x="600" y="154" font-size="10" text-anchor="end">Jamminroot/Jamminroot</text>
<text class="muted" x="86" y="170" font-size="11">Iterated on generating profile cards and an LLM-driven CV</text>
