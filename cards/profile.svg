  <rect class="bg" x="0" y="0" width="952" height="910" rx="8" ry="8"/>
  <g transform="translate(24, 24)"><text class="fg" x="0" y="14" font-size="16" font-weight="700">Recent activity</text>
<text class="muted" x="600" y="14" font-size="10" text-anchor="end">updated 2026-05-09</text>
<text class="muted" x="0" y="32" font-size="12">Focused on building a custom GitHub profile with auto-generated CV</text>
<text class="muted" x="0" y="50" font-size="12">cards, maintaining a Telegram automation node for n8n, and shipping a</text>
<text class="muted" x="0" y="68" font-size="12">major update to a Windows file-tagging utility.</text>
<text class="accent" x="0" y="116" font-size="11" font-weight="600">2026 May</text>
<circle class="accent" cx="70" cy="112" r="4"/>
<text class="fg" x="86" y="136" font-size="13" font-weight="600">Automated GitHub profile and CV generation</text>
<text class="muted" x="600" y="136" font-size="10" text-anchor="end">Jamminroot/Jamminroot</text>
<text class="muted" x="86" y="152" font-size="11">Iterated on a workflow that generates a dynamic profile README</text>
<text class="muted" x="86" y="168" font-size="11">with an LLM-powered CV timeline and sidebar cards.</text>
<text class="fg" x="86" y="196" font-size="13" font-weight="600">Profile card generator and CV timeline</text>
<text class="muted" x="600" y="196" font-size="10" text-anchor="end">Jamminroot/jamminroot_profile_cards</text>
<text class="muted" x="86" y="212" font-size="11">Built and refined a custom card generator that produces a</text>
<text class="muted" x="86" y="228" font-size="11">combined profile SVG with a CV timeline.</text>
<line class="border" x1="70" y1="116" x2="70" y2="240" stroke-width="1"/>
<text class="accent" x="0" y="268" font-size="11" font-weight="600">2026 Apr</text>
<circle class="accent" cx="70" cy="264" r="4"/>
<text class="fg" x="86" y="288" font-size="13" font-weight="600">Proxy API patch for Clash.Meta fork</text>
<text class="muted" x="600" y="288" font-size="10" text-anchor="end">Jamminroot/Clash.Meta</text>
<text class="muted" x="86" y="304" font-size="11">Re-exposed proxy listing APIs in a Mihomo fork to support</text>
<text class="muted" x="86" y="320" font-size="11">FlClash integration.</text>
<line class="border" x1="70" y1="268" x2="70" y2="332" stroke-width="1"/>
<text class="accent" x="0" y="360" font-size="11" font-weight="600">2026 Feb</text>
<circle class="accent" cx="70" cy="356" r="4"/>
<text class="fg" x="86" y="380" font-size="13" font-weight="600">Telegram automation node for n8n</text>
<text class="muted" x="600" y="380" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="396" font-size="11">Stabilised the node package with CI fixes, auth handling</text>
<text class="muted" x="86" y="412" font-size="11">improvements, and a new album trigger.</text>
<text class="fg" x="86" y="440" font-size="13" font-weight="600">Windows Explorer file-tagging utility</text>
<text class="muted" x="600" y="440" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="456" font-size="11">Prepared and documented the v2 release of a tool that adds tag</text>
<text class="muted" x="86" y="472" font-size="11">support to Windows Explorer.</text>
<text class="fg" x="86" y="500" font-size="13" font-weight="600">Personal Neovim development environment</text>
<text class="muted" x="600" y="500" font-size="10" text-anchor="end">Jamminroot/.dotfiles</text>
<text class="muted" x="86" y="516" font-size="11">Maintained a full Neovim IDE setup, migrating to newer APIs and</text>
<text class="muted" x="86" y="532" font-size="11">improving remote session support.</text>
<text class="fg" x="86" y="560" font-size="13" font-weight="600">On-host YOLO labelling tool</text>
<text class="muted" x="600" y="560" font-size="10" text-anchor="end">Jamminroot/yolo-labeler</text>
<text class="muted" x="86" y="576" font-size="11">Started a minimalistic, fast labelling tool for personal</text>
<text class="muted" x="86" y="592" font-size="11">computer vision projects.</text>
<line class="border" x1="70" y1="360" x2="70" y2="604" stroke-width="1"/>
<text class="accent" x="0" y="632" font-size="11" font-weight="600">2026 Jan</text>
<circle class="accent" cx="70" cy="628" r="4"/>
<text class="fg" x="86" y="652" font-size="13" font-weight="600">Telegram automation node for n8n</text>
<text class="muted" x="600" y="652" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="668" font-size="11">Worked on session storage stability and version bumps for the</text>
<text class="muted" x="86" y="684" font-size="11">n8n community node.</text>
<text class="fg" x="86" y="712" font-size="13" font-weight="600">Windows Explorer file-tagging utility</text>
<text class="muted" x="600" y="712" font-size="10" text-anchor="end">Jamminroot/intag</text>
<text class="muted" x="86" y="728" font-size="11">Finalised the v2 release with Microsoft Store listing and</text>
<text class="muted" x="86" y="744" font-size="11">extended metadata support.</text>
<line class="border" x1="70" y1="632" x2="70" y2="756" stroke-width="1"/>
<text class="accent" x="0" y="784" font-size="11" font-weight="600">2025</text>
<circle class="accent" cx="70" cy="780" r="4"/>
<text class="fg" x="86" y="804" font-size="13" font-weight="600">Telegram automation node for n8n</text>
<text class="muted" x="600" y="804" font-size="10" text-anchor="end">Jamminroot/n8n-nodes-telepilot-2</text>
<text class="muted" x="86" y="820" font-size="11">Launched the fork with Docker deployment support and initial</text>
<text class="muted" x="86" y="836" font-size="11">auth fixes.</text>
